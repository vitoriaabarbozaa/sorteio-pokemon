<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorteio Pokémon</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Descubra qual é o seu Pokémon</h1>
</header>

<main class="container">

<div id="pokemon-container"></div>

<div class="card-inicial">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/98/International_Pok%C3%A9mon_logo.svg/1920px-International_Pok%C3%A9mon_logo.svg.png" alt="Pokemon logo" class="imagem-inicial">
  
  <p class="texto-inicial">Clique no botão para sortear um Pokémon.</p>
  
  <button id="btn-sortear" class="botao-sortear">Sortear Pokémon</button>
</div>

</main>

<script src="script.js"></script>
</body>
</html>
